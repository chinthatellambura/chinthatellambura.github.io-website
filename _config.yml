# Theme
remote_theme: "mmistakes/minimal-mistakes"

# Site Settings
locale: "en-US"
title: "Chintha Tellambura"
title_separator: "-"
name: "Chintha Tellambura"
description: "Research and academic website"

# GitHub Pages settings (IMPORTANT)
url: "https://chinthatellambura.github.io"
baseurl: "/chinthatellambura.github.io-website"
repository: "chinthatellambura/chinthatellambura.github.io-website"

# Appearance
minimal_mistakes_skin: "default"

# Author Profile (sidebar)
author:
  name: "Chintha Tellambura"
  avatar: "/assets/images/bio-photo.jpg"  # optional (add image later)
  bio: "Researcher in your field"
  location: ""
  email: ""
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/chinthatellambura"

# Footer links
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/chinthatellambura"

# Reading Files
include:
  - _pages

# Markdown + Processing
markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true

# Permalinks
permalink: /:categories/:title/

# Pagination
paginate: 5
paginate_path: /page:num/

# Plugins (GitHub Pages compatible)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# Defaults (applies layout automatically)
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true
      related: true

  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
