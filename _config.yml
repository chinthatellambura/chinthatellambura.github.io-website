# Theme
remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "default"

# Site Settings
locale: "en-US"
title: "Chintha Tellambura"
name: "Chintha Tellambura"
description: "Professor, University of Alberta"
url: "https://chinthatellambura.github.io"
baseurl: "/chinthatellambura.github.io-website"

# Author Profile (sidebar info)
author:
  name: "Chintha Tellambura"
  avatar: "/assets/images/bio-photo.jpg"
  bio: "Ph.D., P.Eng., Professor, IEEE Fellow"
  location: "University of Alberta"
  email: "ct4@ualberta.ca"
  links:
    - label: "Phone"
      icon: "fas fa-fw fa-phone"
      url: "tel:+17804927228"
    - label: "Office"
      icon: "fas fa-fw fa-building"
      url: ""
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com"
    - label: "Google Scholar"
      icon: "fas fa-fw fa-graduation-cap"
      url: "https://scholar.google.ca/citations?user=7hw2Ha4AAAAJ&hl=en"

# Plugins (GitHub Pages supported)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# Defaults (GLOBAL LAYOUT CONTROL)
defaults:
  # Pages → WIDE + NO SIDEBAR
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false
      classes: wide

  # Posts (if you ever use blog)
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      classes: wide
      read_time: true
      share: true
      related: true

# Markdown
markdown: kramdown
highlighter: rouge

# Pagination (disable blog-style homepage behavior)
paginate: 0

# Exclude unnecessary files
exclude:
  - README.md
  - LICENSE
  - node_modules
  - vendor
